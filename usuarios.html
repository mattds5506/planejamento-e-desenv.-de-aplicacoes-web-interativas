<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmissão de Dados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="container bg-warning">
    <h1>Usuários de Teste via REST</h1>
    <a href="https://reqres.in" target="_blank" rel="noopener noreferrer" 
    style="color: white; text-decoration: none";>Os usuários desse exemplo são fornecidos pela API de testes reqres.in</a>
    <div id="usuarios" class="container-fluid">
        <div class="row">
            <div v-for="user in users" :key="user.id" class="col-md-3 col-sm-6 p-2 m-3 card">
                <img :src="user.avatar" class="card-img-top">
                <div class="card-body"> 
                    <h5 class="card-title">{{user.first_name}} {{user.last_name}}</h5>
                    <p class="card-text">{{user.email}}</p>
                </div>
            </div>
            <div v-for="user in users" :key="user.id" class="col-md-3 col-sm-6 p-2 m-3 card">
                <img :src="user.avatar" class="card-img-top">
                <div class="card-body"> 
                    <h5 class="card-title">{{user.first_name}} {{user.last_name}}</h5>
                    <p class="card-text">{{user.email}}</p>
                </div>
            </div>
            <div v-for="user in users" :key="user.id" class="col-md-3 col-sm-6 p-2 m-3 card">
                <img :src="user.avatar" class="card-img-top">
                <div class="card-body"> 
                    <h5 class="card-title">{{user.first_name}} {{user.last_name}}</h5>
                    <p class="card-text">{{user.email}}</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function loadUsers() {
            try {
                const resposta = await fetch('https://reqres.in/api/users?per_page=10', {
                method: 'GET',
                headers: {
                    'X-API-KEY': 'pro_6aac22b2d873e11beb6e1fd7cae17e0c576d2fb595575396e861f2d3375e1c90',
                    'Content-Type': 'application/json'
                }
                });
                if (!resposta.ok) {
                    throw new Error('Erro na requisição: ' + resposta.status);
                }
            const data = await resposta.json();
            console.log(data);
          } catch (erro) {
            console.error('Erro:', erro);
        }
        }
        loadUsers();

        const app = new Vue({
        el: '#usuarios',
            data() {
                return {
                    users: []
        };
        },
        mounted() {
            this.loadUsers();
        },
        methods: {
            loadUsers() {
                fetch('https://reqres.in/api/users?per_page=10')
                    .then(response => response.json())
                    .then(data => {
                        this.users = data.data;
                    })
                    .catch(error => console.error('Erro ao carregar usuários:', error));
                }   
            }
        });
    </script>
</body>
</html>

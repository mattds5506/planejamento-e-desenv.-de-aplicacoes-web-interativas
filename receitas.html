<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Receitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #pnlCatalogo {
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha */
            gap: 20px; /* Espaçamento entre os painéis */
            padding: 20px;
            justify-content: center; /* Alinha painéis à esquerda */
            width: 100%;
        }
    </style> 
</head>
<body onload="preencheCatalogo()">
    <h1>Catálogo de Receitas</h1>
    <div class="container-fluid bg-warning vh-100 p-5">
        <div id="pnlCatalogo" class="catalogo-container"></div> 
    </div>
    <script>
        const receitas = [

        { 
        "titulo": "Pizza Margherita ", 
        "imagem": "pizza.png", 
        "preparo": "Misture farinha, água, fermento e sal para criar a massa. Estique a massa em formato redondo. Acrescente molho de tomate, queijo e manjericão.", 
        "ingredientes": [ 
            "250g de Farinha", 	
            "150ml de Água", 
            "Meia colher de chá de fermento biológico", 
            "1 colher de chá de sal", 
            "Molho de tomate", 
            "Queijo",
            "Manjericão" 
        ]
        },

        { 
        "titulo": "Churros assado", 
        "imagem": "churros.png", 
        "preparo": "Cozinha a água, açúcar e manteiga até ferver. Acrescente a farinha para formar a massa. Formate os churros do tamanho desejado. Leve a forno pré-aquecido. Misture no doce de leite.", 
        "ingredientes": [ 
            "1 xícara de Água", 	
            "1 xícara de Farinha", 
            "1 colher de sopa de Açúcar", 
            "2 colheres de sopa de Manteiga", 
            "Doce de Leite", 
            "1 colher de sopa de fermento" 
        ]
        },
 
        { 
        "titulo": "Pão sem glúten", 
        "imagem": "pao.png", 
        "preparo": "Bata a cenoura, ovos e óleo no liquidificador. Misture com a farinha e açúcar, depois asse por 40 min.", 
        "ingredientes": [ 
            "150ml de água", 	
            "3 ovos", 
            "1 colher de sopa de Açucar", 
            "1 xícara de farinha de arroz", 
            "10g de fermento biológico", 
            "1 + ¼ xícara de polvilho doce", 
            "1 colher de chá sal",
            "Meia colher de chá de goma xantana",
            "3 colheres de sopa de azeite" 
        ]
        }
        ]

        function getListaIngredientes(receitas) {
            const listaHTML = "<ul>" + receitas.map(ingrediente => `<li>${ingrediente}</li>`).join('') + "</ul>";
            return listaHTML;
        }

        function getCard(receitas) {
            return `
                <div class="card" style="width: 250px;">
                    <img src="${receitas.imagem}" class="card-img-top">
                    <div class="card-body">
                        <h1 class="card-title" style="font-size: 1rem;">${receitas.titulo}</h1>
                        <div class="card-text" style="font-size: 0.9rem;">
                            ${getListaIngredientes(receitas.ingredientes)}
                            <hr>
                            <p style="text-align: justify">${receitas.preparo}</p>
                        </div>
                    </div>    
                </div>
            `}       

        function preencheCatalogo() {
            const painel = document.getElementById('pnlCatalogo');
            const recipes = receitas.map(receita => getCard(receita)).reduce((acumulador, recipes) => acumulador + recipes, "");  
            painel.innerHTML= recipes;
        }

        const img = document.createElement("img");
        img.src = "pizza.png"
        img.src = "churros.png"
        img.src = "pao.png"
    </script>
</body>
</html>
